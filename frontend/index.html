<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFull - Frontend Test</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .hidden { display: none; }
        input { display: block; margin-bottom: 10px; width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; cursor: pointer; }
        #response-log { background: #f4f4f4; padding: 10px; white-space: pre-wrap; font-family: monospace; border: 1px solid #ddd; height: 150px; overflow-y: auto;}
    </style>
</head>
<body>

    <h1>MindFull Simple Test Frontend</h1>

    <div id="auth-section" class="section">
        <h2>Register / Login</h2>
        <input type="email" id="email" placeholder="Email" value="test@example.com">
        <input type="password" id="password" placeholder="Password" value="password123">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>

    <div id="dashboard-section" class="section hidden">
        <h2>Dashboard</h2>
        <p>You are logged in!</p>
        <button onclick="getUserProfile()">Get My Profile</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="section">
        <h2>Response Log</h2>
        <div id="response-log"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
