<!DOCTYPE html>
<html>
<head>
    <title>MindFull Extension</title>
    <style>
        body { width: 300px; padding: 15px; font-family: sans-serif; }
        .hidden { display: none; }
        input { width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; cursor: pointer; margin-bottom: 5px; }
        #status { margin-top: 10px; font-size: 12px; color: #555; word-wrap: break-word; }
    </style>
</head>
<body>
    <h3>MindFull</h3>
    
    <div id="auth-view">
        <input type="email" id="email" placeholder="Email" value="test@example.com">
        <input type="password" id="password" placeholder="Password" value="password123">
        <button id="login-btn">Login</button>
    </div>

    <div id="main-view" class="hidden">
        <p>Logged in!</p>
        <button id="test-api-btn">Test API (Profile)</button>
        <button id="logout-btn">Logout</button>
    </div>

    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
